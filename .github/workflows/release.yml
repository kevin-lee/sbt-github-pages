name: Release

on:
  push:
    tags:
      - '*'

env:
  # Java 17 is required for the Scala 3 / sbt 2 axis (the 3.8.4 compiler is compiled for Java 17).
  # It also builds the Scala 2.12 / sbt 1 axis fine, so the non-publishing jobs standardize on it.
  GH_JAVA_VERSION: "17"
  GH_DISTRIBUTION: "temurin"
  GH_JAVA_OPTS: "-Xss64m -Xms1024m -Xmx4G -XX:MaxMetaspaceSize=1G"

jobs:

  setup:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      scala-matrix: ${{ steps.read.outputs.matrix }}
      java11-versions: ${{ steps.read.outputs.java11 }}
      java17-versions: ${{ steps.read.outputs.java17 }}
      java-versions: ${{ steps.read.outputs.javas }}
    steps:
      - uses: actions/checkout@v7
      - id: read
        run: |
          echo "matrix=$(jq -c . .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          echo "java11=$(jq -c '[.[] | select(."java-version" == "11") | .version]' .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          echo "java17=$(jq -c '[.[] | select(."java-version" == "17") | .version]' .github/scala-versions.json)" >> "$GITHUB_OUTPUT"
          {
            echo "javas<<__GHA_EOF__"
            jq -r '[.[]."java-version"] | unique | .[]' .github/scala-versions.json
            echo "__GHA_EOF__"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scala: ${{ fromJSON(needs.setup.outputs.scala-matrix) }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.scala.java-version }}
          distribution: ${{ matrix.scala.java-distribution }}
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1

      - name: "Build for ${{ matrix.scala.name }} (${{ matrix.scala.version }}) on Java ${{ matrix.scala.java-version }}"
        env:
          JAVA_OPTS: ${{ env.GH_JAVA_OPTS }}
          JVM_OPTS: ${{ env.GH_JAVA_OPTS }}
          SBT_OPTS: ${{ env.GH_JAVA_OPTS }}
        run: |
          .github/workflows/sbt-build.sh ${{ matrix.scala.version }} ${{ matrix.scala.sbt-series }}

  sbt-test:
    needs: setup
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        scala: ${{ fromJSON(needs.setup.outputs.scala-matrix) }}

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.scala.java-version }}
          distribution: ${{ matrix.scala.java-distribution }}
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1

      - name: "Scripted for ${{ matrix.scala.name }} (${{ matrix.scala.sbt-series }}) on Java ${{ matrix.scala.java-version }}"
        env:
          JAVA_OPTS: ${{ env.GH_JAVA_OPTS }}
          JVM_OPTS: ${{ env.GH_JAVA_OPTS }}
          SBT_OPTS: ${{ env.GH_JAVA_OPTS }}
        run: |
          .github/workflows/sbt-scripted.sh ${{ matrix.scala.version }} ${{ matrix.scala.sbt-series }}

  gh-release:
    needs: [build, sbt-test]
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ env.GH_JAVA_VERSION }}
          distribution: ${{ env.GH_DISTRIBUTION }}
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1

      - name: sbt GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_AUTH_TOKEN_GITHUB }}
          JAVA_OPTS: ${{ env.GH_JAVA_OPTS }}
          JVM_OPTS: ${{ env.GH_JAVA_OPTS }}
          SBT_OPTS: ${{ env.GH_JAVA_OPTS }}
        run: |
          echo "Run] sbt GitHub release"
          echo 'sbt devOopsGitHubRelease'
          sbt devOopsGitHubRelease

  publish:
    needs: [setup, gh-release]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      # Install every JDK the matrix uses (Java 11 for the sbt 1 / Scala 2.12 axis,
      # Java 17 for the sbt 2 / Scala 3 axis) so each axis is published on its own JDK.
      - uses: actions/setup-java@v5
        with:
          java-version: ${{ needs.setup.outputs.java-versions }}
          distribution: ${{ env.GH_DISTRIBUTION }}
          cache: 'sbt'
      - uses: sbt/setup-sbt@v1

      - name: sbt Publish sbt-github-pages
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SBT_OPTS: ${{ env.GH_JAVA_OPTS }}
          JAVA11_VERSIONS_JSON: ${{ needs.setup.outputs.java11-versions }}
          JAVA17_VERSIONS_JSON: ${{ needs.setup.outputs.java17-versions }}
        shell: bash
        run: |
          echo "====================="
          echo "| Publish: Start    |"
          echo "====================="
          export SOURCE_DATE_EPOCH=$(date +%s)
          echo "SOURCE_DATE_EPOCH=$SOURCE_DATE_EPOCH"

          # `ci-release` expands to a single `+publishSigned` in one JVM, so it cannot straddle
          # the two JDKs the axes require. Do what it does, by hand, once per JDK, then close a
          # single Sonatype bundle with `sonaRelease` (a built-in sbt command since 1.11).
          echo '[GPG] import secret key (same as sbt-ci-release setupGpg)'
          echo "$PGP_SECRET" | base64 --decode | gpg --batch --import

          echo '[Java 11] publishSigned for the sbt 1 / Scala 2.12 axis'
          export JAVA_HOME="$JAVA_HOME_11_X64"
          export PATH="$JAVA_HOME_11_X64/bin:$PATH"
          java -version
          args=(clean)
          while IFS= read -r v; do
            args+=("++${v}" publishSigned)
          done < <(jq -r '.[]' <<< "$JAVA11_VERSIONS_JSON")
          sbt -v "${args[@]}"

          echo '[Java 17] publishSigned for the sbt 2 / Scala 3 axis'
          export JAVA_HOME="$JAVA_HOME_17_X64"
          export PATH="$JAVA_HOME_17_X64/bin:$PATH"
          java -version
          args=()
          while IFS= read -r v; do
            args+=("++${v}" publishSigned)
          done < <(jq -r '.[]' <<< "$JAVA17_VERSIONS_JSON")
          sbt -v "${args[@]}"

          echo '[Release] sonaRelease (a single Sonatype bundle for both axes)'
          sbt -v sonaRelease

          echo "====================="
          echo "| Publish: Done     |"
          echo "====================="
